<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#000000" rx="40"/>
  
  <!-- Left arch - goes up and back down -->
  <path d="M 25 170 Q 25 30, 60 30 Q 90 30, 90 140" 
        stroke="#2196F3" 
        stroke-width="12" 
        fill="none" 
        stroke-linecap="round"/>
  
  <!-- Right arch - goes up and back down -->
  <path d="M 110 140 Q 110 30, 140 30 Q 175 30, 175 170" 
        stroke="#2196F3" 
        stroke-width="12" 
        fill="none" 
        stroke-linecap="round"/>
  
  <!-- Top connecting arch (inverted) -->
  <path d="M 25 170 Q 100 15, 175 170" 
        stroke="#2196F3" 
        stroke-width="12" 
        fill="none" 
        stroke-linecap="round"/>
</svg>